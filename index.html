<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX优先级评估 · 日本酒店搜索路径</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --surface2: #ECEAE4;
    --border: #E2DDD6;
    --border-strong: #C8C3BA;
    --text: #1A1916;
    --text-2: #6B6760;
    --text-3: #9E9A94;
    --p0-bg: #FFF0EE; --p0-text: #8B2A1A; --p0-border: #F5B8B0;
    --p1-bg: #FFF8EE; --p1-text: #7A4A0A; --p1-border: #F5D8A0;
    --p2-bg: #EDFAF3; --p2-text: #0F5C35; --p2-border: #A8E8C8;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px 64px;
  }

  .page { max-width: 960px; margin: 0 auto; }

  /* Header */
  .header { margin-bottom: 28px; }
  .header-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .header p { font-size: 13px; color: var(--text-2); line-height: 1.6; }
  .path-flow {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .path-step {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 3px 9px;
    color: var(--text-2);
  }
  .path-arrow { color: var(--text-3); font-size: 11px; }

  /* 3-col grid */
  .cols {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .dim-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .dim-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .dim-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-3);
    margin-bottom: 3px;
    letter-spacing: 0.04em;
  }
  .dim-title { font-size: 13px; font-weight: 700; }
  .dim-right { text-align: right; }
  .dim-cur {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    color: var(--border-strong);
    line-height: 1;
  }
  .dim-cur.active { color: var(--text); }
  .dim-max { font-family: var(--mono); font-size: 10px; color: var(--text-3); }

  /* Options inside each column */
  .opts { padding: 8px; flex: 1; }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .opt:hover { background: var(--bg); }
  .opt.selected {
    background: var(--surface2);
    border-color: var(--border);
  }
  .opt input { display: none; }

  .radio {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border-strong);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
  }
  .opt.selected .radio { border-color: var(--text); background: var(--text); }
  .radio-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: white;
    opacity: 0;
    transition: opacity 0.12s;
  }
  .opt.selected .radio-dot { opacity: 1; }

  .opt-body { flex: 1; }
  .opt-score {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-3);
    flex-shrink: 0;
    padding-top: 1px;
    min-width: 16px;
  }
  .opt.selected .opt-score { color: var(--text); font-weight: 500; }

  .opt-title { font-size: 12px; font-weight: 500; line-height: 1.4; margin-bottom: 2px; }
  .opt-desc { font-size: 11px; color: var(--text-2); line-height: 1.5; }

  /* Result */
  .result-wrap {
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  .result-wrap.visible { opacity: 1; transform: none; pointer-events: auto; }

  .result-card {
    border-radius: 12px;
    padding: 20px 24px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .result-card.p0 { background: var(--p0-bg); border-color: var(--p0-border); }
  .result-card.p1 { background: var(--p1-bg); border-color: var(--p1-border); }
  .result-card.p2 { background: var(--p2-bg); border-color: var(--p2-border); }

  .result-left { flex-shrink: 0; }
  .result-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .result-card.p0 .result-label { color: var(--p0-text); }
  .result-card.p1 .result-label { color: var(--p1-text); }
  .result-card.p2 .result-label { color: var(--p2-text); }

  .result-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .result-card.p0 .result-name { color: var(--p0-text); }
  .result-card.p1 .result-name { color: var(--p1-text); }
  .result-card.p2 .result-name { color: var(--p2-text); }

  .result-score {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 500;
    line-height: 1;
    flex-shrink: 0;
  }
  .result-score span { font-size: 14px; color: var(--text-3); }
  .result-card.p0 .result-score { color: var(--p0-text); }
  .result-card.p1 .result-score { color: var(--p1-text); }
  .result-card.p2 .result-score { color: var(--p2-text); }

  .result-breakdown {
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }
  .bd-item { text-align: center; }
  .bd-val {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 3px;
  }
  .result-card.p0 .bd-val { color: var(--p0-text); }
  .result-card.p1 .bd-val { color: var(--p1-text); }
  .result-card.p2 .bd-val { color: var(--p2-text); }
  .bd-label { font-size: 10px; color: var(--text-3); }

  .result-tip {
    flex: 1;
    min-width: 200px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
    padding-left: 20px;
    border-left: 1px solid rgba(0,0,0,0.1);
  }
  .result-tip strong { font-weight: 700; }

  /* bar */
  .bar-track {
    width: 100%;
    height: 3px;
    background: rgba(0,0,0,0.08);
    border-radius: 2px;
    overflow: hidden;
    margin: 10px 0 0;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }
  .result-card.p0 .bar-fill { background: var(--p0-text); }
  .result-card.p1 .bar-fill { background: var(--p1-text); }
  .result-card.p2 .bar-fill { background: var(--p2-text); }

  /* reset */
  .bottom-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 12px;
  }
  .reset-btn {
    font-family: var(--sans);
    font-size: 12px;
    color: var(--text-3);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    transition: color 0.12s, background 0.12s;
  }
  .reset-btn:hover { color: var(--text); background: var(--surface); }

  .footer {
    margin-top: 40px;
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.06em;
  }

  /* Mobile: stack to single col */
  @media (max-width: 640px) {
    .cols { grid-template-columns: 1fr; }
    .result-card { flex-direction: column; gap: 16px; }
    .result-tip { border-left: none; padding-left: 0; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 12px; }
    .result-breakdown { justify-content: flex-start; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-tag">UX Issue Priority Framework · JP Hotel Search</div>
    <h1>优先级评估工具</h1>
    <p>三个维度打分，自动判断修复优先级。</p>
    <div class="path-flow">
      <span class="path-step">搜索</span>
      <span class="path-arrow">→</span>
      <span class="path-step">酒店信息页</span>
      <span class="path-arrow">→</span>
      <span class="path-step">跳转 OTA</span>
    </div>
  </div>

  <div class="cols">

    <!-- Col 1 -->
    <div class="dim-card">
      <div class="dim-header">
        <div>
          <div class="dim-num">01</div>
          <div class="dim-title">转化影响度</div>
        </div>
        <div class="dim-right">
          <div class="dim-cur" id="cur1">—</div>
          <div class="dim-max">/ 4</div>
        </div>
      </div>
      <div class="opts">
        <label class="opt" id="d1o4">
          <input type="radio" name="d1" value="4" onchange="calc()">
          <div class="radio"><div class="radio-dot"></div></div>
          <div class="opt-score">4</div>
          <div class="opt-body">
            <div class="opt-title">直接阻断转化</div>
            <div class="opt-desc">无法或放弃跳转 OTA（价格缺失、跳转失效）</div>
          </div>
        </label>
        <label class="opt" id="d1o3">
          <input type="radio" name="d1" value="3" onchange="calc()">
          <div class="radio"><div class="radio-dot"></div></div>
          <div class="opt-score">3</div>
          <div class="opt-body">
            <div class="opt-title">显著降低点击意愿</div>
            <div class="opt-desc">信息失去信任，不愿点击（价格矛盾、关键信息缺失）</div>
          </div>
        </label>
        <label class="opt" id="d1o2">
          <input type="radio" name="d1" value="2" onchange="calc()">
          <div class="radio"><div class="radio-dot"></div></div>
          <div class="opt-score">2</div>
          <div class="opt-body">
            <div class="opt-title">增加决策摩擦</div>
            <div class="opt-desc">需额外验证才能决策（表达不清、结构混乱）</div>
          </div>
        </label>
        <label class="opt" id="d1o1">
          <input type="radio" name="d1" value="1" onchange="calc()">
          <div class="radio"><div class="radio-dot"></div></div>
          <div class="opt-score">1</div>
          <div class="opt-body">
            <div class="opt-title">不影响决策</div>
            <div class="opt-desc">视觉或细节问题，用户仍能顺利转化</div>
          </div>
        </label>
      </div>
    </div>

    <!-- Col 2 -->
    <div class="dim-card">
      <div class="dim-header">
        <div>
          <div class="dim-num">02</div>
          <div class="dim-title">日本用户敏感度</div>
        </div>
        <div class="dim-right">
          <div class="dim-cur" id="cur2">—</div>
          <div class="dim-max">/ 3</div>
        </div>
      </div>
      <div class="opts">
        <label class="opt" id="d2o3">
          <input type="radio" name="d2" value="3" onchange="calc()">
          <div class="radio"><div class="radio-dot"></div></div>
          <div class="opt-score">3</div>
          <div class="opt-body">
            <div class="opt-title">核心信任要素</div>
            <div class="opt-desc">费用透明、规则明确、取消政策、服务细节</div>
          </div>
        </label>
        <label class="opt" id="d2o2">
          <input type="radio" name="d2" value="2" onchange="calc()">
          <div class="radio"><div class="radio-dot"></div></div>
          <div class="opt-score">2</div>
          <div class="opt-body">
            <div class="opt-title">本地化体验</div>
            <div class="opt-desc">日语表达、敬语、日期格式、地图习惯</div>
          </div>
        </label>
        <label class="opt" id="d2o1">
          <input type="radio" name="d2" value="1" onchange="calc()">
          <div class="radio"><div class="radio-dot"></div></div>
          <div class="opt-score">1</div>
          <div class="opt-body">
            <div class="opt-title">通用体验问题</div>
            <div class="opt-desc">与日本用户特性无明显关联</div>
          </div>
        </label>
      </div>
    </div>

    <!-- Col 3 -->
    <div class="dim-card">
      <div class="dim-header">
        <div>
          <div class="dim-num">03</div>
          <div class="dim-title">影响范围</div>
        </div>
        <div class="dim-right">
          <div class="dim-cur" id="cur3">—</div>
          <div class="dim-max">/ 3</div>
        </div>
      </div>
      <div class="opts">
        <label class="opt" id="d3o3">
          <input type="radio" name="d3" value="3" onchange="calc()">
          <div class="radio"><div class="radio-dot"></div></div>
          <div class="opt-score">3</div>
          <div class="opt-body">
            <div class="opt-title">全量或主路径</div>
            <div class="opt-desc">搜索结果列表、酒店主页等核心曝光页面</div>
          </div>
        </label>
        <label class="opt" id="d3o2">
          <input type="radio" name="d3" value="2" onchange="calc()">
          <div class="radio"><div class="radio-dot"></div></div>
          <div class="opt-score">2</div>
          <div class="opt-body">
            <div class="opt-title">部分场景</div>
            <div class="opt-desc">特定类型酒店、特定筛选条件或部分模块</div>
          </div>
        </label>
        <label class="opt" id="d3o1">
          <input type="radio" name="d3" value="1" onchange="calc()">
          <div class="radio"><div class="radio-dot"></div></div>
          <div class="opt-score">1</div>
          <div class="opt-body">
            <div class="opt-title">边缘场景</div>
            <div class="opt-desc">极少数用户路径或低频功能</div>
          </div>
        </label>
      </div>
    </div>

  </div>

  <!-- Result -->
  <div class="result-wrap" id="result-wrap">
    <div class="result-card" id="result-card">
      <div class="result-left">
        <div class="result-label">PRIORITY LEVEL</div>
        <div class="result-name" id="result-name"></div>
        <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
      </div>
      <div class="result-score" id="result-score"></div>
      <div class="result-breakdown">
        <div class="bd-item"><div class="bd-val" id="b1"></div><div class="bd-label">转化影响</div></div>
        <div class="bd-item"><div class="bd-val" id="b2"></div><div class="bd-label">JP敏感度</div></div>
        <div class="bd-item"><div class="bd-val" id="b3"></div><div class="bd-label">影响范围</div></div>
      </div>
      <div class="result-tip" id="result-tip"></div>
    </div>
  </div>

  <div class="bottom-row">
    <button class="reset-btn" onclick="resetAll()">重置</button>
  </div>

  <div class="footer">HOTEL UX · JP MARKET · PRIORITY FRAMEWORK v1.1</div>
</div>

<script>
const LEVELS = [
  { min:9, cls:'p0', name:'P0 — 立即修复', tip:'<strong>建议：</strong>阻断或严重损害转化路径，需在下一迭代周期优先处理。若涉及功能异常，评估是否需要紧急热修（hotfix）。' },
  { min:6, cls:'p1', name:'P1 — 近期修复', tip:'<strong>建议：</strong>显著影响日本用户决策效率或信任感，建议纳入当前季度排期，1–2个版本内完成优化。' },
  { min:0, cls:'p2', name:'P2 — 规划改进', tip:'<strong>建议：</strong>体验细节或边缘场景问题，纳入迭代backlog，结合设计资源统一规划，不影响核心转化。' }
];

function getVal(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? parseInt(el.value) : null;
}

function calc() {
  const v1 = getVal('d1'), v2 = getVal('d2'), v3 = getVal('d3');

  // update headers
  ['1','2','3'].forEach((n, i) => {
    const v = [v1,v2,v3][i];
    const el = document.getElementById('cur'+n);
    el.textContent = v !== null ? v : '—';
    el.classList.toggle('active', v !== null);
  });

  // update selected styles
  document.querySelectorAll('.opt').forEach(o => {
    o.classList.toggle('selected', o.querySelector('input').checked);
  });

  if (v1 === null || v2 === null || v3 === null) return;

  const total = v1 + v2 + v3;
  const level = LEVELS.find(l => total >= l.min);

  const card = document.getElementById('result-card');
  card.className = 'result-card ' + level.cls;
  document.getElementById('result-name').textContent = level.name;
  document.getElementById('result-score').innerHTML = total + '<span> / 10</span>';
  document.getElementById('b1').textContent = v1+'/4';
  document.getElementById('b2').textContent = v2+'/3';
  document.getElementById('b3').textContent = v3+'/3';
  document.getElementById('bar-fill').style.width = (total/10*100) + '%';
  document.getElementById('result-tip').innerHTML = level.tip;
  document.getElementById('result-wrap').classList.add('visible');
}

function resetAll() {
  document.querySelectorAll('input[type=radio]').forEach(r => r.checked = false);
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  ['1','2','3'].forEach(n => {
    const el = document.getElementById('cur'+n);
    el.textContent = '—';
    el.classList.remove('active');
  });
  document.getElementById('result-wrap').classList.remove('visible');
}
</script>
</body>
</html>
